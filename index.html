<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard TeMon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .header-bar { background-color: #1a365d; color: white; padding: 15px 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card-tech { border: none; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: transform 0.2s; height: 100%; }
    .card-tech:hover { transform: translateY(-5px); }
    .status-badge { font-weight: 600; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; letter-spacing: 0.5px; }
    
    .bg-idle { background-color: #d1e7dd; color: #0f5132; }
    .bg-working { background-color: #f8d7da; color: #842029; }
    .bg-libur { background-color: #fff3cd; color: #856404; }
    
    .indicator-line { height: 6px; border-radius: 10px 10px 0 0; }
    .job-box { background-color: #fff5f5; border: 1px solid #fed7d7; padding: 10px; border-radius: 6px; }
    .idle-box { background-color: #f8fafc; border: 1px dashed #cbd5e0; padding: 15px; border-radius: 6px; }
    
    .nav-tabs .nav-link { font-weight: bold; color: #1a365d; cursor: pointer; border: none; }
    .nav-tabs .nav-link.active { color: #dc3545; border-bottom: 3px solid #dc3545; background-color: transparent; }
  </style>
</head>
<body>
  <div class="container mb-5">
    <div class="header-bar d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="m-0 fw-bold">🚀 Dashboard TeMon (Teknisi Monitoring)</h3>
        <small class="text-light opacity-75">Sistem Monitoring Teknisi Terintegrasi Real-Time</small>
      </div>
      <div class="text-end">
        <div id="last-update" class="text-warning small mb-1">Memuat data...</div>
        <button onclick="refreshCurrentTab()" class="btn btn-light btn-sm fw-bold text-primary shadow-sm">🔄 Refresh</button>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label fw-bold text-muted">📍 Filter Service Area:</label>
        <select id="sa-filter" class="form-select border-primary fw-bold" onchange="applyGlobalFilter()">
          <option value="ALL">Semua Area</option>
        </select>
      </div>
    </div>

    <ul class="nav nav-tabs mb-4">
      <li class="nav-item">
        <a class="nav-link active" id="tab-live" onclick="switchTab('live')">📡 Live Monitoring</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="tab-history" onclick="switchTab('history')">📅 History Pekerjaan</a>
      </li>
    </ul>

    <div id="loader" class="text-center my-5">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
      <h5 class="mt-3 text-muted" id="loader-text">Sinkronisasi Data...</h5>
    </div>

    <div id="content-live" class="d-none">
      <div id="container-teknisi" class="row g-4"></div>
    </div>

    <div id="content-history" class="d-none">
      <div class="card p-4 border-0 shadow-sm rounded-3">
        <div class="row mb-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label fw-bold text-muted">Filter Tanggal:</label>
            <input type="date" id="date-filter" class="form-control border-primary" onchange="filterHistory()">
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover table-sm align-middle shadow-sm">
            <thead class="table-dark">
              <tr>
                <th>Nama Teknisi</th>
                <th>Pekerjaan</th>
                <th class="text-center">STO & Tim</th>
                <th class="text-center">Waktu (Mulai - Selesai)</th>
                <th class="text-center">Durasi</th>
                <th class="text-center">Status</th>
              </tr>
            </thead>
            <tbody id="history-body">
              <tr><td colspan="6" class="text-center text-muted py-4">Memuat data history...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'live';
    let historyData = [];
    let dashboardDataFull = []; // Menyimpan data utuh live agar mudah difilter

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-live').classList.toggle('active', tab === 'live');
      document.getElementById('tab-history').classList.toggle('active', tab === 'history');
      
      document.getElementById('content-live').classList.toggle('d-none', tab !== 'live');
      document.getElementById('content-history').classList.toggle('d-none', tab !== 'history');
      
      if(tab === 'history' && historyData.length === 0) {
        loadHistory();
      } else {
        applyGlobalFilter(); // Terapkan filter saat pindah tab
      }
    }

    function refreshCurrentTab() {
      if(currentTab === 'live') loadData();
      else loadHistory();
    }

    // Fungsi untuk mengisi opsi dropdown Service Area
    function populateSADropdown(data) {
       const select = document.getElementById('sa-filter');
       const currentVal = select.value;
       
       // Ambil nilai SA yang unik dan tidak kosong
       const uniqueSA = [...new Set(data.map(item => item.sa))].filter(sa => sa && sa !== "-");
       
       let optionsHtml = '<option value="ALL">Semua Area</option>';
       uniqueSA.forEach(sa => {
          optionsHtml += `<option value="${sa}">${sa}</option>`;
       });
       
       select.innerHTML = optionsHtml;
       // Tahan pilihan user sebelumnya jika data baru di-refresh
       if(uniqueSA.includes(currentVal)) select.value = currentVal;
    }

    // Fungsi memfilter kedua tab berdasarkan Service Area
    function applyGlobalFilter() {
       const selectedSA = document.getElementById('sa-filter').value;
       
       if(currentTab === 'live') {
          const filtered = selectedSA === 'ALL' ? dashboardDataFull : dashboardDataFull.filter(d => d.sa === selectedSA);
          renderCards(filtered);
       } else {
          filterHistory(); 
       }
    }

    // ================= LIVE TAB =================
    async function loadData() {
      document.getElementById('loader').classList.remove('d-none');
      document.getElementById('content-live').classList.add('d-none');
      
      try {
        const response = await fetch('/api/dashboard');
        dashboardDataFull = await response.json();
        
        populateSADropdown(dashboardDataFull);
        applyGlobalFilter();
      } catch (error) {
        document.getElementById('last-update').innerHTML = "Gagal memuat data!";
      }
    }

    function renderCards(data) {
      var container = document.getElementById('container-teknisi');
      container.innerHTML = '';
      
      data.sort((a, b) => {
        let rankA = a.status === 'Progress' ? 1 : (a.jadwal === 'Libur' ? 3 : 2);
        let rankB = b.status === 'Progress' ? 1 : (b.jadwal === 'Libur' ? 3 : 2);
        return rankA - rankB;
      });

      data.forEach(function(item) {
        var isIdle = item.status === "Idle";
        var isLibur = item.jadwal === "Libur";
        
        var badgeClass = isIdle ? "bg-idle" : "bg-working";
        var indicatorColor = isIdle ? "#198754" : "#dc3545";
        var textStatus = item.status.toUpperCase();

        if(isLibur && isIdle) {
            badgeClass = "bg-libur";
            indicatorColor = "#ffc107";
            textStatus = "LIBUR";
        }
        
        var cardHtml = `
          <div class="col-md-4 col-lg-3">
            <div class="card card-tech">
              <div class="indicator-line" style="background-color: ${indicatorColor};"></div>
              <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <div>
                    <h5 class="card-title fw-bold mb-0 text-dark">${item.nama}</h5>
                    <small class="text-muted">NIK: ${item.nik} | SA: <b>${item.sa || '-'}</b></small>
                    <div class="mt-1"><span class="badge ${isLibur ? 'bg-warning text-dark' : 'bg-primary'}">${item.jadwal}</span></div>
                  </div>
                  <span class="status-badge ${badgeClass}">${textStatus}</span>
                </div>
                <hr class="text-muted opacity-25 my-2">
                <div class="mt-auto">
                  ${item.status === 'Progress' ? `
                    <div class="job-box">
                      <strong class="d-block text-danger mb-1" style="font-size:0.95rem;">🛠 ${item.detail.pekerjaan}</strong>
                      <div class="d-flex justify-content-between align-items-center mb-1">
                        <small class="text-dark fw-semibold">📍 STO ${item.detail.sto}</small>
                        <span class="badge bg-secondary opacity-75">🕒 ${item.detail.mulai}</span>
                      </div>
                      <div class="mb-1 bg-white p-1 rounded border border-danger text-center">
                        <small class="text-danger fw-bold">⏳ Sedang berjalan: ${item.detail.durasi}</small>
                      </div>
                      <small class="text-muted d-block mt-2 border-top pt-1">
                        👥 <b>Tim:</b> ${item.detail.utama} ${item.detail.partner && item.detail.partner !== '-' ? `& ${item.detail.partner}` : '(Sendiri)'}
                      </small>
                    </div>
                  ` : `
                    <div class="idle-box text-center text-muted">
                      <span style="font-size: 1.5rem;">${isLibur ? '🏖️' : '☕'}</span><br>
                      <small>${isLibur ? 'Sedang libur tugas' : 'Siap menerima order baru'}</small>
                    </div>
                  `}
                </div>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
      
      updateJam();
      document.getElementById('loader').classList.add('d-none');
      if(currentTab === 'live') document.getElementById('content-live').classList.remove('d-none');
    }

    // ================= HISTORY TAB =================
    async function loadHistory() {
      document.getElementById('loader').classList.remove('d-none');
      try {
        const response = await fetch('/api/history');
        historyData = await response.json();
        
        // Otomatis isi kolom filter dengan tanggal hari ini
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-filter').value = today;
        
        filterHistory();
      } catch (error) {
        document.getElementById('history-body').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Gagal memuat history.</td></tr>';
      } finally {
        document.getElementById('loader').classList.add('d-none');
      }
    }

    function filterHistory() {
      const selectedDate = document.getElementById('date-filter').value;
      const selectedSA = document.getElementById('sa-filter').value;
      const tbody = document.getElementById('history-body');
      
      if (!selectedDate) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Pilih tanggal dulu ya Mas!</td></tr>';
        return;
      }

      // Filter berdasarkan tanggal DAN Service Area
      let filtered = historyData.filter(h => h.tanggal === selectedDate);
      if (selectedSA !== 'ALL') {
         filtered = filtered.filter(h => h.sa === selectedSA);
      }
      
      if (filtered.length === 0) {
         tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">Kosong. Tidak ada data di filter ini.</td></tr>`;
         return;
      }

      // Render tabel yang sudah difilter dan tampilkan Partner
      tbody.innerHTML = filtered.map(h => `
        <tr>
          <td class="fw-bold text-dark text-truncate" style="max-width: 150px;">${h.nama}</td>
          <td class="text-primary fw-semibold">${h.pekerjaan || '-'}</td>
          <td class="text-center">
            <span class="badge bg-secondary mb-1">STO ${h.sto || '-'}</span>
            <br>
            <small class="text-muted fw-bold" style="font-size: 0.75rem;">👥 ${h.partner ? h.partner : 'Sendiri'}</small>
          </td>
          <td class="text-nowrap text-center">
            <small class="d-block text-success fw-bold">${h.jamMulai || '-'}</small>
            <small class="d-block text-danger fw-bold">${h.jamSelesai || '-'}</small>
          </td>
          <td class="text-center"><span class="badge bg-info text-dark shadow-sm">⏱️ ${h.durasi || '-'}</span></td>
          <td class="text-center">
            <span class="badge ${h.status.toLowerCase() === 'selesai' ? 'bg-success' : 'bg-danger'}">
              ${h.status || 'Progress'}
            </span>
          </td>
        </tr>
      `).join('');
    }

    function updateJam() {
      var now = new Date();
      var ts = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2) + ":" + ("0" + now.getSeconds()).slice(-2);
      document.getElementById('last-update').innerHTML = "Update terakhir: " + ts;
    }

    window.onload = function() {
      loadData();
      setInterval(() => { if(currentTab === 'live') loadData(); }, 30000); 
    };
  </script>
</body>
</html>
